<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <div class="preview-container">
        <img class="preview" alt="Fresh Bacon" src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/389177/bacon.jpg" onmouseover="upDate(this)" onmouseleave="unDo()">
        
        <img class="preview" alt="Beautiful Mountains" src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/389177/mountain.jpg" onmouseover="upDate(this)" onmouseleave="unDo()">
        
        <img class="preview" alt="Blue Sky" src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/389177/sky.jpg" onmouseover="upDate(this)" onmouseleave="unDo()">
    </div>

    <script src="script.js"></script>
</body>
</html>
